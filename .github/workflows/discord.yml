name: GitHub Discord Feed

on:
  push:
  pull_request:
  issues:
  release:
  workflow_run:
    types: [completed]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord Webhook
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          EVENT="${{ github.event_name }}"

          if [ "$EVENT" = "push" ]; then
            curl -H "Content-Type: application/json" -X POST -d "{
              \"embeds\": [{
                \"title\": \"Commit\",
                \"description\": \"${{ github.event.head_commit.message }}\",
                \"url\": \"${{ github.event.head_commit.url }}\",
                \"color\": 5814783,
                \"fields\": [
                  {\"name\": \"Author\", \"value\": \"${{ github.event.head_commit.author.name }}\", \"inline\": true},
                  {\"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true},
                  {\"name\": \"Repository\", \"value\": \"${{ github.repository }}\", \"inline\": true}
                ],
                \"footer\": {
                  \"text\": \"Commit ID: ${{ github.sha }}\"
                }
              }]
            }" $WEBHOOK
          fi

          if [ "$EVENT" = "pull_request" ]; then
            curl -H "Content-Type: application/json" -X POST -d "{
              \"embeds\": [{
                \"title\": \"Pull Request - ${{ github.event.action }}\",
                \"description\": \"${{ github.event.pull_request.title }}\",
                \"url\": \"${{ github.event.pull_request.html_url }}\",
                \"color\": 3447003,
                \"fields\": [
                  {\"name\": \"Author\", \"value\": \"${{ github.event.pull_request.user.login }}\", \"inline\": true},
                  {\"name\": \"Base\", \"value\": \"${{ github.event.pull_request.base.ref }}\", \"inline\": true},
                  {\"name\": \"Compare\", \"value\": \"${{ github.event.pull_request.head.ref }}\", \"inline\": true}
                ]
              }]
            }" $WEBHOOK
          fi

          if [ "$EVENT" = "workflow_run" ]; then
            COLOR=15158332
            if [ "${{ github.event.workflow_run.conclusion }}" = "success" ]; then
              COLOR=3066993
            fi

            curl -H "Content-Type: application/json" -X POST -d "{
              \"embeds\": [{
                \"title\": \"Workflow: ${{ github.event.workflow_run.name }}\",
                \"description\": \"Status: ${{ github.event.workflow_run.conclusion }}\",
                \"url\": \"${{ github.event.workflow_run.html_url }}\",
                \"color\": $COLOR,
                \"fields\": [
                  {\"name\": \"Branch\", \"value\": \"${{ github.event.workflow_run.head_branch }}\", \"inline\": true},
                  {\"name\": \"Triggered by\", \"value\": \"${{ github.event.workflow_run.actor.login }}\", \"inline\": true}
                ]
              }]
            }" $WEBHOOK
          fi

          if [ "$EVENT" = "issues" ]; then
            curl -H "Content-Type: application/json" -X POST -d "{
              \"embeds\": [{
                \"title\": \"Issue - ${{ github.event.action }}\",
                \"description\": \"${{ github.event.issue.title }}\",
                \"url\": \"${{ github.event.issue.html_url }}\",
                \"color\": 15844367,
                \"fields\": [
                  {\"name\": \"Author\", \"value\": \"${{ github.event.issue.user.login }}\", \"inline\": true},
                  {\"name\": \"State\", \"value\": \"${{ github.event.issue.state }}\", \"inline\": true}
                ]
              }]
            }" $WEBHOOK
          fi

          if [ "$EVENT" = "release" ]; then
            curl -H "Content-Type: application/json" -X POST -d "{
              \"embeds\": [{
                \"title\": \"Release: ${{ github.event.release.name }}\",
                \"description\": \"${{ github.event.release.tag_name }}\",
                \"url\": \"${{ github.event.release.html_url }}\",
                \"color\": 10181046
              }]
            }" $WEBHOOK
          fi
