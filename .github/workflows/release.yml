name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version du release (ex: 1.0.0)'
        required: true
      title:
        description: 'Titre du release (optionnel)'
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.1"

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build --parallel --build-cache --configuration-cache --no-daemon

      - name: Generate commit log
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD | head -1)

          echo "## 📋 Changes" > notes.md
          echo "" >> notes.md
          git log ${LAST_TAG}..HEAD --pretty=format:"- %s \`%h\`" --no-merges >> notes.md
          echo "" >> notes.md
          echo "---" >> notes.md
          echo "" >> notes.md
          echo "## 🔗 Links" >> notes.md
          echo "" >> notes.md
          echo "| | |" >> notes.md
          echo "|---|---|" >> notes.md
          echo "| 📥 **Modrinth** | [Download on Modrinth](https://modrinth.com/mod/homegui) |" >> notes.md
          echo "| 💬 **Discord** | [Join the Discord](https://discord.gg/pnJhKuU2QK) |" >> notes.md
          echo "" >> notes.md
          echo "---" >> notes.md
          echo "" >> notes.md
          echo "> 🎮 **Minecraft:** 1.21.10 | **Mod Loader:** Fabric" >> notes.md
          echo "> 📦 **File:** \`homegui-${{ inputs.version }}.jar\`" >> notes.md

      - name: Copy JAR
        run: |
          mkdir -p release
          cp build/libs/*-[0-9]*.jar release/homegui-${{ inputs.version }}.jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: ${{ inputs.title || format('HomeGUI v{0}', inputs.version) }}
          body_path: notes.md
          files: release/*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
